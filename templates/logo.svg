<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)"/>
  
  <!-- Grid pattern (entramado) -->
  <g stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <!-- Horizontal lines -->
    <line x1="50" y1="70" x2="150" y2="70"/>
    <line x1="50" y1="100" x2="150" y2="100"/>
    <line x1="50" y1="130" x2="150" y2="130"/>
    
    <!-- Vertical lines -->
    <line x1="70" y1="50" x2="70" y2="150"/>
    <line x1="100" y1="50" x2="100" y2="150"/>
    <line x1="130" y1="50" x2="130" y2="150"/>
  </g>
  
  <!-- Intersection dots -->
  <g fill="white">
    <circle cx="70" cy="70" r="5"/>
    <circle cx="100" cy="70" r="5"/>
    <circle cx="130" cy="70" r="5"/>
    <circle cx="70" cy="100" r="5"/>
    <circle cx="100" cy="100" r="6"/>
    <circle cx="130" cy="100" r="5"/>
    <circle cx="70" cy="130" r="5"/>
    <circle cx="100" cy="130" r="5"/>
    <circle cx="130" cy="130" r="5"/>
  </g>
</svg>